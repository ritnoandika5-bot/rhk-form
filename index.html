<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHK Harian Wali Asrama - Sekolah Rakyat Terintegrasi 21 Mamuju</title>
    
    <!-- Library untuk Download -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        h2 {
            color: #667eea;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .info-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .info-item {
            display: flex;
            gap: 10px;
        }

        .info-item label {
            font-weight: 600;
            color: #333;
            min-width: 100px;
        }

        .info-item span {
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="date"],
        input[type="time"],
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input[type="date"]:focus,
        input[type="time"]:focus,
        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .file-upload-container {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-upload-container:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .file-upload-container input[type="file"] {
            display: none;
        }

        .file-upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .file-list {
            margin-top: 15px;
            text-align: left;
        }

        .file-item {
            background: white;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }

        .file-item button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .file-item button:hover {
            background: #ee5a52;
        }

        .section-title {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            margin-top: 30px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-pdf {
            background: #ff4444;
            color: white;
        }

        .btn-pdf:hover {
            background: #dd3333;
            transform: translateY(-2px);
        }

        .btn-word {
            background: #2c5aa0;
            color: white;
        }

        .btn-word:hover {
            background: #1e3f7a;
            transform: translateY(-2px);
        }

        .btn-reset {
            background: #e9ecef;
            color: #333;
        }

        .btn-reset:hover {
            background: #dee2e6;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            z-index: 1000;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .alert.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        @media print {
            body {
                background: white;
            }
            .container {
                box-shadow: none;
                padding: 0;
            }
            .button-group {
                display: none;
            }
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .info-section {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 22px;
            }

            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📋 RHK Harian Wali Asrama</h1>
            <h2>Sekolah Rakyat Terintegrasi 21 Mamuju</h2>
        </div>

        <!-- Alert Messages -->
        <div class="alert success" id="successAlert">
            ✓ Siap didownload!
        </div>
        <div class="alert error" id="errorAlert">
            ✗ Mohon isi semua field yang diperlukan!
        </div>
        <div class="alert info" id="infoAlert">
            ⓘ Memproses download...
        </div>

        <form id="rhkForm">
            <!-- Informasi Pengguna -->
            <div class="info-section">
                <div class="info-item">
                    <label>Nama:</label>
                    <span>RITNO</span>
                </div>
                <div class="info-item">
                    <label>NIP:</label>
                    <span>19912312025211081</span>
                </div>
            </div>

            <!-- Form Section 1 -->
            <div class="form-row">
                <div class="form-group">
                    <label for="tanggal">Tanggal:</label>
                    <input type="date" id="tanggal" name="tanggal" required>
                </div>
                <div class="form-group">
                    <label for="jam">Jam:</label>
                    <input type="time" id="jam" name="jam" required>
                </div>
            </div>

            <!-- Form Section 2 -->
            <div class="form-group">
                <label for="rhk">Pilih RHK:</label>
                <select id="rhk" name="rhk" required>
                    <option value="">-- Pilih RHK --</option>
                    <option value="rhk1">RHK 1 - Pagi (06:00-12:00)</option>
                    <option value="rhk2">RHK 2 - Siang (12:00-18:00)</option>
                    <option value="rhk3">RHK 3 - Malam (18:00-24:00)</option>
                    <option value="rhk4">RHK 4 - Dini Hari (00:00-06:00)</option>
                    <option value="rhk5">RHK 5 - Tambahan</option>
                    <option value="rhk6">RHK 6 - Khusus</option>
                </select>
            </div>

            <!-- Form Section 3 -->
            <div class="form-group form-row full">
                <label for="kegiatan">Kegiatan/Catatan:</label>
                <textarea id="kegiatan" name="kegiatan" placeholder="Tuliskan kegiatan atau catatan harian di sini..." required></textarea>
            </div>

            <!-- File Upload Section -->
            <div class="section-title">📁 Lampiran Dokumentasi (Opsional)</div>
            <div class="form-group">
                <div class="file-upload-container" id="fileUploadContainer">
                    <div class="file-upload-icon">📸</div>
                    <p><strong>Klik atau tarik file ke sini</strong></p>
                    <p style="font-size: 12px; color: #666; margin-top: 5px;">
                        Format: JPG, PNG, PDF (Maksimal 5MB per file)
                    </p>
                    <input type="file" id="fileInput" name="fileInput" multiple accept=".jpg,.jpeg,.png,.pdf">
                </div>
                <div class="file-list" id="fileList"></div>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="button" class="btn-pdf" onclick="downloadPDF()">📄 Download PDF</button>
                <button type="button" class="btn-word" onclick="downloadWord()">📝 Download Word</button>
                <button type="button" class="btn-reset" onclick="resetForm()">🔄 Reset</button>
            </div>
        </form>
    </div>

    <script>
        // Set today's date as default
        document.getElementById('tanggal').valueAsDate = new Date();

        // File upload handling
        const fileUploadContainer = document.getElementById('fileUploadContainer');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        let selectedFiles = [];

        // Click to upload
        fileUploadContainer.addEventListener('click', () => {
            fileInput.click();
        });

        // Drag and drop
        fileUploadContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUploadContainer.style.borderColor = '#764ba2';
            fileUploadContainer.style.background = '#f0f2ff';
        });

        fileUploadContainer.addEventListener('dragleave', () => {
            fileUploadContainer.style.borderColor = '#667eea';
            fileUploadContainer.style.background = '#f8f9ff';
        });

        fileUploadContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUploadContainer.style.borderColor = '#667eea';
            fileUploadContainer.style.background = '#f8f9ff';
            handleFiles(e.dataTransfer.files);
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            for (let file of files) {
                if (validateFile(file)) {
                    selectedFiles.push(file);
                }
            }
            displayFiles();
        }

        function validateFile(file) {
            const maxSize = 5 * 1024 * 1024; // 5MB
            const allowedTypes = ['image/jpeg', 'image/png', 'application/pdf'];

            if (file.size > maxSize) {
                alert(`File ${file.name} terlalu besar (maksimal 5MB)`);
                return false;
            }

            if (!allowedTypes.includes(file.type)) {
                alert(`File ${file.name} format tidak didukung`);
                return false;
            }

            return true;
        }

        function displayFiles() {
            fileList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <span>📄 ${file.name} (${(file.size / 1024).toFixed(2)} KB)</span>
                    <button type="button" onclick="removeFile(${index})">Hapus</button>
                `;
                fileList.appendChild(fileItem);
            });
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            displayFiles();
        }

        function resetForm() {
            document.getElementById('rhkForm').reset();
            selectedFiles = [];
            fileList.innerHTML = '';
            document.getElementById('tanggal').valueAsDate = new Date();
            hideAllAlerts();
        }

        function showAlert(type) {
            hideAllAlerts();
            document.getElementById(`${type}Alert`).style.display = 'block';
            setTimeout(() => {
                document.getElementById(`${type}Alert`).style.display = 'none';
            }, 3000);
        }

        function hideAllAlerts() {
            document.getElementById('successAlert').style.display = 'none';
            document.getElementById('errorAlert').style.display = 'none';
            document.getElementById('infoAlert').style.display = 'none';
        }

        // Download PDF
        function downloadPDF() {
            const tanggal = document.getElementById('tanggal').value;
            const jam = document.getElementById('jam').value;
            const rhk = document.getElementById('rhk').value;
            const kegiatan = document.getElementById('kegiatan').value;

            if (!tanggal || !jam || !rhk || !kegiatan) {
                showAlert('error');
                return;
            }

            try {
                const element = document.createElement('div');
                element.innerHTML = `
                    <style>
                        body { font-family: Arial, sans-serif; padding: 20px; }
                        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
                        h1 { margin: 0; font-size: 18px; }
                        h2 { margin: 5px 0; font-size: 14px; color: #666; }
                        .info-section { margin: 20px 0; }
                        .info-row { margin: 8px 0; }
                        .label { font-weight: bold; display: inline-block; width: 150px; }
                        .value { display: inline-block; }
                        .section-title { font-weight: bold; margin-top: 15px; margin-bottom: 10px; border-bottom: 1px solid #ccc; }
                    </style>
                    <div class="header">
                        <h1>RHK HARIAN WALI ASRAMA</h1>
                        <h2>Sekolah Rakyat Terintegrasi 21 Mamuju</h2>
                    </div>
                    <div class="info-section">
                        <div class="info-row">
                            <span class="label">Nama:</span>
                            <span class="value">RITNO</span>
                        </div>
                        <div class="info-row">
                            <span class="label">NIP:</span>
                            <span class="value">19912312025211081</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Tanggal:</span>
                            <span class="value">${tanggal}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">Jam:</span>
                            <span class="value">${jam}</span>
                        </div>
                        <div class="info-row">
                            <span class="label">RHK:</span>
                            <span class="value">${document.getElementById('rhk').options[document.getElementById('rhk').selectedIndex].text}</span>
                        </div>
                    </div>
                    <div class="section-title">KEGIATAN / CATATAN</div>
                    <p style="white-space: pre-wrap; line-height: 1.6;">${kegiatan}</p>
                    <p style="margin-top: 30px; font-size: 11px; color: #999;">Dokumen ini dibuat pada: ${new Date().toLocaleString('id-ID')}</p>
                `;

                const opt = {
                    margin: 10,
                    filename: `RHK_${tanggal}_RITNO.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
                };

                html2pdf().set(opt).from(element).save().then(() => {
                    showAlert('success');
                }).catch(err => {
                    console.error('PDF Error:', err);
                    alert('Gagal download PDF. Coba gunakan download Word atau print manual.');
                });
            } catch (err) {
                console.error('Error:', err);
                alert('Terjadi kesalahan. Silakan coba lagi.');
            }
        }

        // Download Word
        function downloadWord() {
            const tanggal = document.getElementById('tanggal').value;
            const jam = document.getElementById('jam').value;
            const rhk = document.getElementById('rhk').value;
            const kegiatan = document.getElementById('kegiatan').value;

            if (!tanggal || !jam || !rhk || !kegiatan) {
                showAlert('error');
                return;
            }

            try {
                // Simple HTML to Word using blob
                const htmlContent = `
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <style>
                            body { font-family: Arial, sans-serif; padding: 40px; }
                            .header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid black; padding-bottom: 10px; }
                            h1 { margin: 0; font-size: 20px; }
                            h2 { margin: 10px 0 0 0; font-size: 14px; }
                            table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                            td { border: 1px solid #ccc; padding: 8px; }
                            .section-title { font-weight: bold; margin-top: 20px; margin-bottom: 10px; }
                            .kegiatan { white-space: pre-wrap; line-height: 1.6; }
                        </style>
                    </head>
                    <body>
                        <div class="header">
                            <h1>RHK HARIAN WALI ASRAMA</h1>
                            <h2>Sekolah Rakyat Terintegrasi 21 Mamuju</h2>
                        </div>
                        <table>
                            <tr><td style="width: 30%; font-weight: bold;">Nama:</td><td>RITNO</td></tr>
                            <tr><td style="font-weight: bold;">NIP:</td><td>19912312025211081</td></tr>
                            <tr><td style="font-weight: bold;">Tanggal:</td><td>${tanggal}</td></tr>
                            <tr><td style="font-weight: bold;">Jam:</td><td>${jam}</td></tr>
                            <tr><td style="font-weight: bold;">RHK:</td><td>${document.getElementById('rhk').options[document.getElementById('rhk').selectedIndex].text}</td></tr>
                        </table>
                        <div class="section-title">KEGIATAN / CATATAN</div>
                        <div class="kegiatan">${kegiatan}</div>
                        <p style="margin-top: 30px; font-size: 11px; color: #999;">Dokumen ini dibuat pada: ${new Date().toLocaleString('id-ID')}</p>
                    </body>
                    </html>
                `;

                const blob = new Blob([htmlContent], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `RHK_${tanggal}_RITNO.doc`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                showAlert('success');
            } catch (err) {
                console.error('Word Error:', err);
                alert('Gagal download Word. Silakan coba lagi.');
            }
        }
    </script>
</body>
</html>
